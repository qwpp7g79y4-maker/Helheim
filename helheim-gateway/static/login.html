<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helheim - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #09090b; color: #f0f0f3; }
        .glow { text-shadow: 0 0 24px rgba(139, 92, 246, 0.35); }
        .card { background: rgba(16, 16, 20, 0.85); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 16px; }
        .btn-primary { background: #8b5cf6; border-radius: 10px; font-weight: 600; }
        .btn-primary:hover { background: #7c3aed; box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        input { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: #f0f0f3; border-radius: 10px; }
        input:focus { border-color: rgba(139, 92, 246, 0.4); outline: none; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); }
        .tab { cursor: pointer; padding: 0.5rem 1rem; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab.active { border-color: #8b5cf6; color: #c4b5fd; }
        .tab:hover { color: #e4e4e7; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <div class="w-8 h-8 bg-violet-600 rounded-xl shadow-lg shadow-violet-600/20 flex items-center justify-center font-bold text-sm">H</div>
                <span class="text-xl font-bold glow">Helheim</span>
            </a>
            <a href="/" class="text-sm text-gray-400 hover:text-gray-300">Home</a>
        </div>
    </nav>

    <div class="max-w-md mx-auto mt-16 px-6">
        <h1 class="text-3xl font-bold mb-6 text-center glow">Welcome</h1>

        <!-- Tabs -->
        <div class="flex justify-center gap-4 mb-6 border-b border-gray-800 pb-0">
            <span class="tab active text-sm font-semibold" id="tab-login" onclick="showTab('login')">Login</span>
            <span class="tab text-sm font-semibold text-gray-500" id="tab-register" onclick="showTab('register')">Register</span>
            <span class="tab text-sm font-semibold text-gray-500" id="tab-apikey" onclick="showTab('apikey')">API Key</span>
        </div>

        <!-- Error message -->
        <div id="error-msg" class="hidden bg-red-900/20 border border-red-800/30 text-red-400 text-xs rounded-lg px-4 py-2 mb-4"></div>
        <!-- Success message -->
        <div id="success-msg" class="hidden bg-green-900/20 border border-green-800/30 text-green-400 text-xs rounded-lg px-4 py-2 mb-4"></div>

        <!-- Login Form -->
        <div id="form-login" class="card rounded-xl p-8">
            <label class="block text-sm text-gray-400 mb-1">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-lg mb-3 text-sm" autocomplete="email" />
            <label class="block text-sm text-gray-400 mb-1">Password</label>
            <input type="password" id="login-password" placeholder="Your password"
                class="w-full px-4 py-3 rounded-lg mb-4 text-sm" autocomplete="current-password"
                onkeydown="if(event.key==='Enter')doLogin()" />
            <button onclick="doLogin()" id="login-btn" class="btn-primary w-full py-3 rounded-lg font-semibold text-white cursor-pointer">
                Login
            </button>
            <p class="text-xs text-gray-600 mt-3 text-center">
                No account? <span onclick="showTab('register')" class="text-indigo-400 cursor-pointer hover:underline">Register here</span>
            </p>
        </div>

        <!-- Register Form -->
        <div id="form-register" class="card rounded-xl p-8 hidden">
            <label class="block text-sm text-gray-400 mb-1">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-lg mb-3 text-sm" autocomplete="email" />
            <label class="block text-sm text-gray-400 mb-1">Password</label>
            <input type="password" id="reg-password" placeholder="Min. 6 characters"
                class="w-full px-4 py-3 rounded-lg mb-3 text-sm" autocomplete="new-password" />
            <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
            <input type="password" id="reg-password2" placeholder="Repeat password"
                class="w-full px-4 py-3 rounded-lg mb-4 text-sm" autocomplete="new-password"
                onkeydown="if(event.key==='Enter')doRegister()" />
            <button onclick="doRegister()" id="reg-btn" class="btn-primary w-full py-3 rounded-lg font-semibold text-white cursor-pointer">
                Create Account
            </button>
            <p class="text-xs text-gray-600 mt-3 text-center">
                Already have an account? <span onclick="showTab('login')" class="text-indigo-400 cursor-pointer hover:underline">Login here</span>
            </p>
        </div>

        <!-- API Key Form (fallback) -->
        <div id="form-apikey" class="card rounded-xl p-8 hidden">
            <label class="block text-sm text-gray-400 mb-1">API Key</label>
            <input type="text" id="apikey" placeholder="hel-xxxx-xxxxxxxxxxxx"
                class="w-full px-4 py-3 rounded-lg mb-4 text-sm font-mono"
                onkeydown="if(event.key==='Enter')doApiKey()" />
            <button onclick="doApiKey()" class="btn-primary w-full py-3 rounded-lg font-semibold text-white cursor-pointer">
                Login with Key
            </button>
        </div>

        <div class="mt-8 text-center text-xs text-gray-600 space-x-3">
            <a href="/terms" class="hover:text-gray-400">Terms of Service</a>
            <span>&middot;</span>
            <a href="/terms#privacy" class="hover:text-gray-400">Privacy Policy</a>
            <span>&middot;</span>
            <a href="/feedback" class="hover:text-gray-400">Feedback</a>
        </div>
    </div>

    <script>
        function showTab(tab) {
            ['login','register','apikey'].forEach(function(t) {
                document.getElementById('form-'+t).classList.toggle('hidden', t !== tab);
                document.getElementById('tab-'+t).classList.toggle('active', t === tab);
                document.getElementById('tab-'+t).classList.toggle('text-gray-500', t !== tab);
            });
            hideMessages();
        }

        function hideMessages() {
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');
        }

        function showError(msg) {
            var el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('success-msg').classList.add('hidden');
        }

        function showSuccess(msg) {
            var el = document.getElementById('success-msg');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('error-msg').classList.add('hidden');
        }

        function getRedirect() {
            var params = new URLSearchParams(window.location.search);
            return params.get('redirect') || 'dashboard';
        }

        function goTo(apiKey) {
            // Always set cookie so server-side auth works
            document.cookie = 'helheim_session=' + encodeURIComponent(apiKey) + '; path=/; max-age=2592000; samesite=lax';
            localStorage.setItem('helheim_api_key', apiKey);
            var dest = getRedirect();
            // Include ?key= in URL as fallback for mobile browsers where cookies may not work
            window.location.href = '/' + dest + '?key=' + encodeURIComponent(apiKey);
        }

        function doLogin() {
            hideMessages();
            var email = document.getElementById('login-email').value.trim();
            var password = document.getElementById('login-password').value;
            if (!email || !password) { showError('Please fill in all fields'); return; }

            var btn = document.getElementById('login-btn');
            btn.disabled = true; btn.textContent = 'Logging in...';

            fetch('/api/v1/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                btn.disabled = false; btn.textContent = 'Login';
                if (res.ok) {
                    localStorage.setItem('helheim_email', email);
                    localStorage.setItem('helheim_api_key', res.data.api_key);
                    goTo(res.data.api_key);
                } else {
                    showError(res.data.message || 'Login failed');
                }
            }).catch(function(e) {
                btn.disabled = false; btn.textContent = 'Login';
                showError('Connection error: ' + e.message);
            });
        }

        function doRegister() {
            hideMessages();
            var email = document.getElementById('reg-email').value.trim();
            var pw1 = document.getElementById('reg-password').value;
            var pw2 = document.getElementById('reg-password2').value;
            if (!email || !pw1 || !pw2) { showError('Please fill in all fields'); return; }
            if (pw1 !== pw2) { showError('Passwords do not match'); return; }
            if (pw1.length < 6) { showError('Password must be at least 6 characters'); return; }

            var btn = document.getElementById('reg-btn');
            btn.disabled = true; btn.textContent = 'Creating account...';

            fetch('/api/v1/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pw1 })
            }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                btn.disabled = false; btn.textContent = 'Create Account';
                if (res.ok) {
                    localStorage.setItem('helheim_email', email);
                    localStorage.setItem('helheim_api_key', res.data.api_key);
                    showSuccess('Account created! Your API key: ' + res.data.api_key);
                    setTimeout(function() { goTo(res.data.api_key); }, 1500);
                } else {
                    showError(res.data.message || 'Registration failed');
                }
            }).catch(function(e) {
                btn.disabled = false; btn.textContent = 'Create Account';
                showError('Connection error: ' + e.message);
            });
        }

        function doApiKey() {
            var key = document.getElementById('apikey').value.trim();
            if (!key) return;
            // Set cookie via login-with-key endpoint
            document.cookie = 'helheim_session=' + encodeURIComponent(key) + '; path=/; max-age=2592000; samesite=lax';
            goTo(key);
        }

        // Auto-login: if key exists in localStorage, sync cookie and redirect
        var savedKey = localStorage.getItem('helheim_api_key');
        if (savedKey) {
            document.cookie = 'helheim_session=' + encodeURIComponent(savedKey) + '; path=/; max-age=2592000; samesite=lax';
            var dest = getRedirect();
            if (dest !== 'login') { window.location.href = '/' + dest + '?key=' + encodeURIComponent(savedKey); }
        }
        // Auto-fill email from localStorage
        var savedEmail = localStorage.getItem('helheim_email');
        if (savedEmail) document.getElementById('login-email').value = savedEmail;
        document.getElementById('login-email').focus();
    </script>
</body>
</html>
