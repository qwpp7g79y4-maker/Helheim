<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helheim Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* === Helheim Chat — Professional Theme === */
    :root {
        --bg-primary: #09090b; --bg-secondary: #0c0c10; --bg-card: rgba(16,16,20,0.85);
        --bg-input: rgba(18,18,24,0.9); --bg-hover: rgba(255,255,255,0.04);
        --border-subtle: rgba(255,255,255,0.06); --border-focus: rgba(139,92,246,0.4);
        --accent: #8b5cf6; --accent-soft: rgba(139,92,246,0.12); --accent-hover: rgba(139,92,246,0.18);
        --text-primary: #f0f0f3; --text-secondary: #a1a1aa; --text-muted: #52525b;
        --success: #22c55e; --danger: #ef4444;
    }
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: var(--bg-primary); color: var(--text-primary); }
    body > *:not(canvas) { position: relative; z-index: 1; }
    nav { background: rgba(9,9,11,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); }
    body > .border-t { background: rgba(9,9,11,0.92); backdrop-filter: blur(12px); }
    .glow { text-shadow: 0 0 24px rgba(139,92,246,0.35); }
    .btn-primary { background: var(--accent); transition: all 0.2s; border-radius: 8px; font-weight: 500; }
    .btn-primary:hover { background: #7c3aed; box-shadow: 0 0 20px rgba(139,92,246,0.2); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-secondary); transition: all 0.2s; border-radius: 8px; }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.12); color: var(--text-primary); background: var(--bg-hover); }
    .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; border-radius: 8px; }
    .btn-danger:hover { background: rgba(239,68,68,0.18); }
    select, input, textarea { background: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--text-primary); transition: all 0.2s; border-radius: 8px; }
    select:focus, input:focus, textarea:focus { border-color: var(--border-focus); outline: none; box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
    .msg-user { background: var(--accent-soft); border: 1px solid rgba(139,92,246,0.15); border-radius: 12px; }
    .msg-assistant { background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle); border-radius: 12px; }
    #chat-messages { scroll-behavior: smooth; }
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    #chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
    .typing-indicator span { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
    .markdown-content p { margin-bottom: 0.5em; line-height: 1.65; }
    .markdown-content ul, .markdown-content ol { margin-left: 1.5em; margin-bottom: 0.5em; }
    .markdown-content li { margin-bottom: 0.25em; line-height: 1.6; }
    .markdown-content strong { color: #d4d4d8; font-weight: 600; }
    .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 700; margin-top: 0.75em; margin-bottom: 0.25em; color: #e4e4e7; }
    .markdown-content blockquote { border-left: 2px solid rgba(139,92,246,0.3); padding-left: 1em; margin: 0.5em 0; color: var(--text-secondary); }
    .markdown-content code { background: rgba(255,255,255,0.06); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; font-family: 'JetBrains Mono','Fira Code',monospace; color: #c4b5fd; }
    .markdown-content pre { background: rgba(0,0,0,0.5); border: 1px solid var(--border-subtle); border-radius: 10px; overflow-x: auto; margin: 0.5em 0; position: relative; }
    .markdown-content pre code { background: none; padding: 0.75em 1em; display: block; color: var(--text-primary); }
    .code-block-wrapper { position: relative; }
    .copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.06); border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 11px; padding: 3px 10px; border-radius: 6px; cursor: pointer; opacity: 0; transition: all 0.2s; }
    .code-block-wrapper:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
    .copy-btn.copied { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #4ade80; }
    .code-lang { position: absolute; top: 8px; left: 12px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .settings-panel { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; }
    .msg-actions { opacity: 0; transition: opacity 0.2s; }
    .msg-wrapper:hover .msg-actions { opacity: 1; }
    .history-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .history-panel.hidden { display: none; }
    .history-card { background: #111; border: 1px solid rgba(139,92,246,0.2); border-radius: 16px; width: 96%; max-width: 860px; height: 88vh; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 30px rgba(139,92,246,0.06); display: flex; flex-direction: column; animation: histIn 0.2s ease-out; }
    @keyframes histIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .history-item { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background 0.15s; border-radius: 8px; margin-bottom: 2px; }
    .history-item:hover { background: rgba(139,92,246,0.08); }
    .history-item.active { background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.2); }

    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- === Cortex Universe Background (Rust/WASM) === -->
    <canvas id="starfield" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>


    <!-- === Chat History Panel (Grok-style centered) === -->
    <div id="history-panel" class="history-panel hidden" onclick="if(event.target===this)ChatHistory.close()">
        <div class="history-card">
            <div class="p-4 border-b border-gray-800 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <h2 class="text-lg font-semibold text-violet-300">Chat History</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="ChatActions.newChat()" class="btn-primary text-xs px-4 py-2 rounded-lg font-semibold text-white cursor-pointer">+ New Chat</button>
                    <button onclick="ChatHistory.close()" class="text-gray-400 hover:text-white cursor-pointer w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10 transition">&#10005;</button>
                </div>
            </div>
            <div class="p-4">
                <input type="text" id="chat-search" placeholder="Zoek in chats..." oninput="ChatHistory.search(this.value)"
                    class="w-full bg-gray-900/80 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:border-violet-500 transition" />
            </div>
            <div id="chat-list" class="overflow-y-auto flex-1 px-4 pb-4" style="max-height:calc(88vh - 140px)">
                <div class="text-sm text-gray-600 py-8 text-center">Loading...</div>
            </div>
        </div>
    </div>

    <!-- === Nav Bar === -->
    <span id="helheim-role" style="display:none">{{ROLE}}</span>
    <nav class="px-6 py-3 flex-shrink-0" style="background:rgba(9,9,11,0.88);backdrop-filter:blur(12px);position:relative;z-index:50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="ChatHistory.toggle()" class="btn-ghost text-xs px-2 py-1.5 rounded cursor-pointer" title="Chat History">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </button>
                <a href="/" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-violet-600 rounded-xl shadow-lg shadow-violet-600/20 flex items-center justify-center font-bold text-sm">H</div>
                    <span class="text-xl font-bold glow">Helheim</span>
                </a>
                <select id="model-select" class="px-2 py-1 rounded-lg text-xs" onchange="ChatActions.readSettings()">
                    <option value="auto">Loading...</option>
                </select>
                <span class="text-xs text-gray-500" id="status-text">Ready</span>
                <button onclick="ChatUI.toggleSettings()" class="btn-ghost text-xs px-2 py-1.5 rounded cursor-pointer" title="Settings">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <button onclick="ChatActions.newChat()" class="btn-ghost text-xs px-2 py-1 rounded cursor-pointer">+ New</button>
            </div>
            <div class="flex items-center gap-3 relative">
                <a href="/settings" class="text-xs text-yellow-400/90 hover:text-yellow-300 px-2 py-1 rounded border border-yellow-500/20" id="nav-credits" title="Credits">—</a>
                <span class="text-xs bg-{{ROLE_COLOR}}-600/20 text-{{ROLE_COLOR}}-400 px-2 py-1 rounded">{{ROLE}}</span>
                <div class="relative">
                    <button type="button" id="nav-menu-btn" class="text-sm font-medium text-zinc-300 hover:text-white px-3 py-2 rounded-lg border border-white/10 hover:border-white/20 transition-colors flex items-center gap-1">Menu <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></button>
                    <div id="nav-dropdown" class="hidden absolute right-0 mt-1 py-1 w-48 rounded-lg border border-white/10 bg-[#0f0f14] shadow-xl z-50">
                        <a href="/dashboard" class="block px-4 py-2 text-sm text-zinc-300 hover:bg-white/5">Dashboard</a>
                        <a href="/chat" class="block px-4 py-2 text-sm text-white hover:bg-white/5">Chat</a>
                        <a href="/tenants" class="block px-4 py-2 text-sm text-zinc-300 hover:bg-white/5">Chatbots</a>
                        <a href="/settings" class="block px-4 py-2 text-sm text-zinc-300 hover:bg-white/5">Instellingen</a>
                        <a href="/feedback" class="block px-4 py-2 text-sm text-amber-400/90 hover:bg-white/5">Feedback</a>
                        <div id="nav-admin-items" class="border-t border-white/5 mt-1 pt-1">
                            <a href="/usage" class="block px-4 py-2 text-sm text-zinc-400 hover:bg-white/5">Usage</a>
                            <a href="/analytics" class="block px-4 py-2 text-sm text-zinc-400 hover:bg-white/5">Analytics</a>
                            <a href="/providers" class="block px-4 py-2 text-sm text-zinc-400 hover:bg-white/5">Providers</a>
                            <a href="/debug" class="block px-4 py-2 text-sm text-zinc-400 hover:bg-white/5">Debug</a>
                        </div>
                        <div class="border-t border-white/5 mt-1 pt-1"><a href="/logout" class="block px-4 py-2 text-sm text-red-400/90 hover:bg-white/5">Uitloggen</a></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <script>(function(){var r=document.getElementById('helheim-role');if(r){r=r.textContent.trim();if(r!=='ADMIN'){var a=document.getElementById('nav-admin-items');if(a)a.style.display='none';}}var b=document.getElementById('nav-menu-btn');var d=document.getElementById('nav-dropdown');if(b&&d){b.onclick=function(){d.classList.toggle('hidden');};document.addEventListener('click',function(e){if(!d.contains(e.target)&&e.target.id!=='nav-menu-btn')d.classList.add('hidden');});}})();</script>

    <!-- Low credits banner -->
    <div id="low-credits-banner" class="hidden px-4 py-2 text-center text-sm bg-amber-500/10 border-b border-amber-500/20 text-amber-400">
        Weinig credits. <a href="/settings" class="underline hover:text-amber-300">Ga naar Instellingen</a> om bij te laden.
    </div>

    <!-- === Settings Panel (hidden by default) === -->
    <div id="settings-panel" class="hidden border-b border-white/[0.06]/30 px-4 py-3 flex-shrink-0">
        <div class="max-w-4xl mx-auto">
            <div class="settings-panel p-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- System Prompt -->
                    <div class="md:col-span-2">
                        <label class="block text-xs text-gray-400 mb-1 font-semibold">System Prompt</label>
                        <textarea id="system-prompt" rows="2"
                            class="w-full px-3 py-2 rounded-lg text-xs resize-none"
                            placeholder="You are a helpful assistant. You can set personality, language, or role here..."
                            onchange="ChatActions.readSettings()"></textarea>
                    </div>
                    <!-- Max Tokens -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-semibold">Max Tokens</label>
                        <input type="number" id="max-tokens" value="512" min="50" max="2048" step="50"
                            class="w-full px-3 py-1.5 rounded-lg text-xs" onchange="ChatActions.readSettings()">
                    </div>
                    <!-- Temperature -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-semibold">Temperature: <span id="temp-display">0.7</span></label>
                        <input type="range" id="temperature" min="0" max="1.5" step="0.1" value="0.7"
                            class="w-full" oninput="document.getElementById('temp-display').textContent=this.value; ChatActions.readSettings()">
                    </div>
                    <!-- Stream toggle -->
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="stream-toggle" checked onchange="ChatActions.readSettings()">
                        <label class="text-xs text-gray-400 font-semibold">SSE Streaming</label>
                    </div>
                    <!-- Export -->
                    <div class="flex items-center gap-2 justify-end">
                        <button onclick="ChatActions.exportTxt()" class="btn-ghost text-xs px-3 py-1 rounded cursor-pointer">Export .txt</button>
                        <button onclick="ChatActions.exportJson()" class="btn-ghost text-xs px-3 py-1 rounded cursor-pointer">Export .json</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- === Chat Messages === -->
    <div class="flex-1 overflow-hidden">
        <div id="chat-messages" class="max-w-4xl mx-auto px-4 py-4 h-full overflow-y-auto space-y-4">
        </div>
    </div>

    <!-- === Input Area === -->
    <div class="border-t border-white/[0.06]/30 px-4 py-3 flex-shrink-0">
        <div class="max-w-4xl mx-auto">
            <div class="flex gap-2 items-end">
                <div class="flex-1">
                    <textarea id="chat-input" rows="1"
                        class="w-full px-4 py-3 rounded-xl text-sm resize-none"
                        placeholder="Type your message... (Shift+Enter for newline)"
                        onkeydown="ChatActions.handleKey(event)"
                        oninput="ChatActions.autoResize(this)"
                        style="max-height: 200px;"></textarea>
                </div>
                <!-- Send button -->
                <button id="send-btn" onclick="ChatActions.send()"
                    class="btn-primary px-4 py-3 rounded-xl font-semibold text-white text-sm cursor-pointer flex items-center gap-1.5">
                    <span>Send</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                </button>
                <!-- Stop button (hidden by default) -->
                <button id="stop-btn" onclick="ChatActions.stop()"
                    class="hidden btn-danger px-4 py-3 rounded-xl font-semibold text-sm cursor-pointer flex items-center gap-1.5">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                    <span>Stop</span>
                </button>
            </div>
            <div class="flex justify-between mt-1.5">
                <span class="text-xs text-gray-600" id="token-count"></span>
                <span class="text-xs text-gray-700">Shift+Enter for newline</span>
            </div>
        </div>
    </div>

    <!-- === State (source: chat/state.js) === -->
    <script>
    var ChatState = {
        apiKey: '', history: [], isGenerating: false, abortController: null, systemPrompt: '',
        settings: { model: 'auto', maxTokens: 512, stream: true, temperature: 0.7 },
        init: function(k) { this.apiKey = k; this.loadSettings(); this.loadModels(); },
        loadSettings: function() { try { var s = localStorage.getItem('helheim_chat_settings'); if (s) Object.assign(this.settings, JSON.parse(s)); var p = localStorage.getItem('helheim_system_prompt'); if (p) this.systemPrompt = p; } catch(e) {} },
        saveSettings: function() { try { localStorage.setItem('helheim_chat_settings', JSON.stringify(this.settings)); localStorage.setItem('helheim_system_prompt', this.systemPrompt); } catch(e) {} },
        loadModels: function() {
            var sel = document.getElementById('model-select'); if (!sel) return;
            Promise.all([
                fetch('/api/v1/models').then(function(r){return r.json();}).catch(function(){return [];}),
                fetch('/api/v1/providers').then(function(r){return r.json();}).catch(function(){return {};})
            ]).then(function(res) {
                var local=res[0]||[], provs=res[1]||{}; sel.innerHTML='';
                var ao=document.createElement('option');ao.value='auto';ao.textContent='\u26a1 Auto (best available)';sel.appendChild(ao);
                if(local.length>0){var g={};local.forEach(function(m){var c=m.category||'general';if(!g[c])g[c]=[];g[c].push(m);});
                    Object.keys(g).sort().forEach(function(c){var gr=document.createElement('optgroup');gr.label='\ud83d\udda5\ufe0f Local: '+c.charAt(0).toUpperCase()+c.slice(1);
                        g[c].forEach(function(m){var o=document.createElement('option');o.value=m.id;o.textContent=m.name+' ('+m.params+')'+(m.tag?' ['+m.tag+']':'');gr.appendChild(o);});sel.appendChild(gr);});}
                var icons={groq:'\u26a1',google:'\ud83e\udde0',grok:'\ud83e\udd16',openai:'\ud83d\udfe2'};
                Object.keys(provs).sort().forEach(function(pid){var p=provs[pid];if(!p.models||!p.models.length)return;
                    var gr=document.createElement('optgroup');gr.label=(icons[pid]||'\u2601\ufe0f')+' '+pid.charAt(0).toUpperCase()+pid.slice(1);
                    p.models.forEach(function(m){var o=document.createElement('option');o.value=pid+'/'+m.id;
                        var lb=m.name||m.id;if(m.context_window)lb+=' ('+Math.round(m.context_window/1000)+'k)';o.textContent=lb;gr.appendChild(o);});sel.appendChild(gr);});
                sel.value=ChatState.settings.model;});
        },
        addMessage: function(r,c) { this.history.push({role:r,content:c}); },
        getMessages: function() { var m=[]; if(this.systemPrompt.trim()) m.push({role:'system',content:this.systemPrompt.trim()}); return m.concat(this.history); },
        removeLastAssistant: function() { for(var i=this.history.length-1;i>=0;i--) { if(this.history[i].role==='assistant'){this.history.splice(i,1);return true;} } return false; },
        clear: function() { this.history = []; },
        exportChat: function() { var t=''; if(this.systemPrompt) t+='[System] '+this.systemPrompt+'\n\n'; this.history.forEach(function(m){t+='['+(m.role==='user'?'You':'Helheim')+']\n'+m.content+'\n\n';}); return t; },
        exportJSON: function() { return JSON.stringify({system_prompt:this.systemPrompt,model:this.settings.model,messages:this.history,exported_at:new Date().toISOString()},null,2); }
    };
    </script>
    <!-- === UI (source: chat/ui.js) === -->
    <script>
    var ChatUI = {

    <!-- === API (source: chat/api.js) === -->
    <script>
    var ChatAPI = {
        streamRequest: function(payload, onChunk, onDone, onError) {
            ChatState.abortController = new AbortController();
            fetch('/v1/chat/completions', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+ChatState.apiKey}, body:JSON.stringify(payload), signal:ChatState.abortController.signal
            }).then(function(r) { if(!r.ok) throw new Error('HTTP '+r.status); var reader=r.body.getReader(),dec=new TextDecoder(),buf='';
                function read() { reader.read().then(function(res) { if(res.done){onDone();return;} buf+=dec.decode(res.value,{stream:true}); var lines=buf.split('\n'); buf=lines.pop()||'';
                    for(var i=0;i<lines.length;i++){var l=lines[i].trim(); if(!l.startsWith('data: '))continue; var d=l.substring(6); if(d==='[DONE]'){onDone();return;} try{var c=JSON.parse(d);var delta=c.choices&&c.choices[0]&&c.choices[0].delta;if(delta&&delta.content)onChunk(delta.content);}catch(e){}} read();
                }).catch(function(e){if(e.name==='AbortError')onDone();else onError(e.message);}); } read();
            }).catch(function(e){if(e.name==='AbortError')onDone();else onError(e.message);});
        },
        fetchRequest: function(payload, onSuccess, onError) {
            ChatState.abortController = new AbortController();
            fetch('/v1/chat/completions', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+ChatState.apiKey}, body:JSON.stringify(payload), signal:ChatState.abortController.signal
            }).then(function(r){return r.json();}).then(function(d){ if(d.error){onError(d.error.message||JSON.stringify(d.error));return;} onSuccess(d.choices[0].message.content,d.usage||{});
            }).catch(function(e){if(e.name!=='AbortError')onError(e.message);});
        },
        abort: function() { if(ChatState.abortController){ChatState.abortController.abort();ChatState.abortController=null;} }
    };
    </script>

    <script>
    var ChatActions = {
        lastBodyEl:null, lastCol:null,
        setPrompt: function(t) { var i=document.getElementById('chat-input'); if(i){i.value=t;i.focus();this.autoResize(i);} },
        handleKey: function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ChatActions.send();} },
        autoResize: function(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; },
        readSettings: function() { var e; e=document.getElementById('model-select'); if(e)ChatState.settings.model=e.value; e=document.getElementById('max-tokens'); if(e)ChatState.settings.maxTokens=parseInt(e.value)||512; e=document.getElementById('stream-toggle'); if(e)ChatState.settings.stream=e.checked; e=document.getElementById('system-prompt'); if(e)ChatState.systemPrompt=e.value; e=document.getElementById('temperature'); if(e)ChatState.settings.temperature=parseFloat(e.value)||0.7; ChatState.saveSettings(); },
        send: function() {
            if(ChatState.isGenerating)return; var input=document.getElementById('chat-input'); var text=input.value.trim(); if(!text)return;
            input.value=''; this.autoResize(input); this.readSettings();
            ChatState.addMessage('user',text); ChatUI.addMessage('user',text);
            var r=ChatUI.addMessage('assistant','',true); this.lastBodyEl=r.body; this.lastCol=r.col;
            ChatState.isGenerating=true; ChatUI.setSendButton(true); ChatUI.setStatus('Generating...','violet');
            var payload={model:ChatState.settings.model,messages:ChatState.getMessages(),max_tokens:ChatState.settings.maxTokens,stream:ChatState.settings.stream};
            var st=Date.now(); if(ChatState.settings.stream) this._streamSend(payload,st); else this._fetchSend(payload,st);
        },
        _streamSend: function(p,st) { var self=this,full=''; ChatAPI.streamRequest(p,function(t){full+=t;ChatUI.updateStreamContent(self.lastBodyEl,full);},function(){self._finish(full,st);},function(m){self.lastBodyEl.innerHTML='<span class="text-red-400">Error: '+ChatUI.escapeHtml(m)+'</span>';self._finish('',st);}); },
        _fetchSend: function(p,st) { var self=this; ChatAPI.fetchRequest(p,function(c){ChatUI.updateStreamContent(self.lastBodyEl,c);self._finish(c,st);},function(m){self.lastBodyEl.innerHTML='<span class="text-red-400">Error: '+ChatUI.escapeHtml(m)+'</span>';self._finish('',st);}); },
        _finish: function(c,st) { if(c){ChatState.addMessage('assistant',c);ChatUI.addMsgActions(this.lastCol);} ChatState.isGenerating=false; ChatUI.setSendButton(false); ChatUI.setStatus('Done ('+((Date.now()-st)/1000).toFixed(1)+'s)','green'); ChatUI.setMsgCount(); document.getElementById('chat-input').focus(); },
        stop: function() { ChatAPI.abort(); ChatState.isGenerating=false; ChatUI.setSendButton(false); ChatUI.setStatus('Stopped','yellow'); },
        regenerate: function() { if(ChatState.isGenerating)return; if(!ChatState.removeLastAssistant())return; var c=document.getElementById('chat-messages'),w=c.querySelectorAll('.msg-wrapper'); for(var i=w.length-1;i>=0;i--){if(w[i].querySelector('.text-purple-400')){w[i].remove();break;}} this.readSettings(); var r=ChatUI.addMessage('assistant','',true); this.lastBodyEl=r.body; this.lastCol=r.col; ChatState.isGenerating=true; ChatUI.setSendButton(true); ChatUI.setStatus('Regenerating...','violet'); var p={model:ChatState.settings.model,messages:ChatState.getMessages(),max_tokens:ChatState.settings.maxTokens,stream:ChatState.settings.stream}; var st=Date.now(); if(ChatState.settings.stream)this._streamSend(p,st);else this._fetchSend(p,st); },
        copyLast: function() { var l=ChatState.history[ChatState.history.length-1]; if(l&&l.role==='assistant') navigator.clipboard.writeText(l.content).then(function(){ChatUI.setStatus('Copied!','green');setTimeout(function(){ChatUI.setStatus('Ready','gray');},1500);}); },

        exportTxt: function() { this._dl('helheim-chat.txt',ChatState.exportChat(),'text/plain'); },

    <!-- === Chat History (source: chat/history.js) === -->
    <script>
    var ChatHistory = {
        currentId: null,
        _searchTimer: null,
        toggle: function() { var p=document.getElementById('history-panel'); p.classList.toggle('hidden'); if(!p.classList.contains('hidden')){this.refresh();var s=document.getElementById('chat-search');if(s)setTimeout(function(){s.focus();},100);} },
        close: function() { document.getElementById('history-panel').classList.add('hidden'); },
        genId: function() { return 'chat-'+Date.now()+'-'+Math.random().toString(36).substr(2,6); },
        search: function(q) {
            clearTimeout(this._searchTimer);
            var self = this;
            this._searchTimer = setTimeout(function() { self._doSearch(q); }, 250);
        },
        _doSearch: function(q) {
            var url = q && q.trim() ? '/api/v1/chats/search?q='+encodeURIComponent(q) : '/api/v1/chats/search';
            fetch(url, {headers:{'Authorization':'Bearer '+ChatState.apiKey}})
            .then(function(r){return r.json();}).then(function(d) {
                ChatHistory._render(d.chats || [], !!q);
            }).catch(function(){});
        },
        refresh: function() {
            var searchEl = document.getElementById('chat-search');
            if (searchEl && searchEl.value.trim()) { this._doSearch(searchEl.value); return; }
            fetch('/api/v1/chats',{headers:{'Authorization':'Bearer '+ChatState.apiKey}})
            .then(function(r){return r.json();}).then(function(d) {
                ChatHistory._render(d.chats || [], false);
            }).catch(function(){});
        },
        _render: function(chats, isSearch) {
            var el=document.getElementById('chat-list');
            if(!chats||chats.length===0){el.innerHTML='<div class="text-xs text-gray-600 px-2 py-4">'+(isSearch?'Geen resultaten.':'Nog geen chats.')+'</div>';return;}
            el.innerHTML=chats.map(function(c){
                var active=c.id===ChatHistory.currentId?' active':'';
                var ago=Math.round(Date.now()/1000-c.updated_at);
                var time=ago<60?ago+'s':ago<3600?Math.round(ago/60)+'m':ago<86400?Math.round(ago/3600)+'h':Math.round(ago/86400)+'d';
                var pin=c.pinned?'<span class="text-yellow-400 text-[10px] mr-1" title="Pinned">&#9733;</span>':'';
                var count=c.message_count?'<span class="text-gray-600">'+c.message_count+' msgs</span>':'';
                var preview=c.snippet||c.preview||'';
                if(preview.length>80) preview=preview.substring(0,80)+'...';
                var previewHtml=preview?'<div class="text-[10px] text-gray-600 mt-0.5 truncate">'+(c.snippet?preview:ChatUI.escapeHtml(preview))+'</div>':'';
                return '<div class="history-item'+active+'" onclick="ChatHistory.load(\''+c.id+'\')">'
                    +'<div class="flex justify-between items-start">'
                    +'<div class="text-xs text-gray-300 truncate flex-1">'+pin+ChatUI.escapeHtml(c.title)+'</div>'
                    +'<div class="flex items-center gap-1 ml-1 flex-shrink-0">'
                    +'<button class="delete-btn text-gray-600 hover:text-yellow-400 text-[10px] cursor-pointer" onclick="event.stopPropagation();ChatHistory.pin(\''+c.id+'\','+(!c.pinned)+')" title="'+(c.pinned?'Unpin':'Pin')+'">'+(c.pinned?'&#9733;':'&#9734;')+'</button>'
                    +'<button class="delete-btn text-gray-600 hover:text-red-400 text-xs cursor-pointer" onclick="event.stopPropagation();ChatHistory.remove(\''+c.id+'\')">&times;</button>'
                    +'</div></div>'
                    +previewHtml
                    +'<div class="text-[10px] text-gray-600 mt-0.5 flex gap-2">'+(c.model||'auto')+' &middot; '+time+' ago'+' &middot; '+count+'</div>'
                    +'</div>';
            }).join('');
        },
        save: function() {
            if(ChatState.history.length===0)return;
            if(!this.currentId) this.currentId=this.genId();
            var title=ChatState.history[0].content.substring(0,60);
            fetch('/api/v1/chats',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ChatState.apiKey},
                body:JSON.stringify({id:this.currentId,title:title,messages:ChatState.history,model:ChatState.settings.model,system_prompt:ChatState.systemPrompt||null})
            }).catch(function(){});
        },
        load: function(id) {
            fetch('/api/v1/chats/'+id,{headers:{'Authorization':'Bearer '+ChatState.apiKey}})
            .then(function(r){return r.json();}).then(function(chat) {
                ChatState.history=chat.messages||[];
                ChatState.systemPrompt=chat.system_prompt||'';
                if(chat.model) ChatState.settings.model=chat.model;
                ChatHistory.currentId=id;
                var container=document.getElementById('chat-messages'); container.innerHTML='';
                ChatState.history.forEach(function(m){ChatUI.addMessage(m.role,m.content,false);});
                ChatUI.syncSettingsUI();
                ChatUI.setMsgCount();
                ChatHistory.close();
            }).catch(function(){});
        },
        remove: function(id) {
            fetch('/api/v1/chats/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+ChatState.apiKey}})
            .then(function(){if(id===ChatHistory.currentId){ChatHistory.currentId=null;} ChatHistory.refresh();}).catch(function(){});
        },
        pin: function(id, pinned) {
            fetch('/api/v1/chats/'+id+'/pin',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ChatState.apiKey},
                body:JSON.stringify({pinned:pinned})
            }).then(function(){ChatHistory.refresh();}).catch(function(){});
        }
    };

    // Patch ChatActions to auto-save and support newChat
    ChatActions._origFinish = ChatActions._finish;
    ChatActions._finish = function(c,st) { this._origFinish(c,st); if(c) ChatHistory.save(); };
    ChatActions.newChat = function() { ChatState.clear(); ChatHistory.currentId=null; ChatUI.showWelcome(); ChatUI.setStatus('Ready','gray'); ChatUI.setMsgCount(); ChatHistory.close(); document.getElementById('chat-input').focus(); };
    </script>

    <script type="module">

    <script>
    (function(){
        var c = document.getElementById('starfield');
        if (!c || c.__wasm) return;
        var ctx = c.getContext('2d');
        var W, H, stars = [], shooting = [], nebulae = [], time = 0, seed = 42;

        function rng() { seed = (seed * 1664525 + 1013904223) >>> 0; return ((seed >> 16) & 0xFFFF) / 65535; }
        function rngR(a,b) { return a + rng() * (b - a); }

        function resize() {
            W = window.innerWidth; H = window.innerHeight;
            c.width = W; c.height = H;
        }

        function init() {
            resize();
            stars = []; shooting = []; nebulae = [];
            // 3 layers: far(300), mid(200), near(80)
            var layers = [[300,0,0.3,0.3],[200,0.3,0.7,0.8],[80,0.7,1.0,1.5]];
            for (var l = 0; l < 3; l++) {
                var cfg = layers[l];
                for (var i = 0; i < cfg[0]; i++) {
                    var z = rngR(cfg[1], cfg[2]);
                    var ct = rng();
                    var r,g,b;
                    if (ct < 0.15) { r=0.7+rng()*0.15; g=0.8+rng()*0.1; b=1; }
                    else if (ct < 0.45) { var w=0.9+rng()*0.1; r=w; g=w; b=1; }
                    else if (ct < 0.70) { r=1; g=0.9+rng()*0.1; b=0.75+rng()*0.15; }
                    else if (ct < 0.85) { r=0.55+rng()*0.2; g=0.45+rng()*0.15; b=1; }
                    else { r=1; g=0.6+rng()*0.2; b=0.3+rng()*0.2; }
                    var bright = z > 0.8 && rng() < 0.3;
                    stars.push({
                        bx: rng()*W, by: rng()*H, z: z,
                        sz: bright ? 1.5+z*2.5 : 0.3+z*1.8,
                        bb: 0.15+z*0.85, ts: 0.3+rng()*4, to: rng()*6.28,
                        ds: cfg[3], cr: r, cg: g, cb: b, bright: bright
                    });
                }
            }
            // Nebulae
            var pal = [[99,102,241],[139,92,246],[59,130,246],[168,85,247],[79,70,229]];
            for (var n = 0; n < 5; n++) {
                var p = pal[n];
                nebulae.push({
                    bx: rng()*W, by: rng()*H, rad: 150+rng()*250,
                    r: p[0], g: p[1], b: p[2], a: 0.006+rng()*0.012,
                    dx: rngR(0.01,0.04), dy: rngR(0.008,0.03), layers: 5+Math.floor(rng()*5)
                });
            }
            // Shooting stars
            for (var s = 0; s < 5; s++) {
                shooting.push({x:0,y:0,vx:0,vy:0,life:0,ml:0,sz:0,active:false,trail:[]});
            }
        }

        function tick(dt) {
            time += dt;
            // Clear
            ctx.fillStyle = '#08080d';
            ctx.fillRect(0, 0, W, H);

            // Nebulae
            for (var n = 0; n < nebulae.length; n++) {
                var nb = nebulae[n];
                var nx = nb.bx + Math.sin(time * nb.dx) * 80;
                var ny = nb.by + Math.cos(time * nb.dy) * 60;
                var pulse = 1 + Math.sin(time * 0.1 + nx * 0.001) * 0.15;
                ctx.fillStyle = 'rgba('+nb.r+','+nb.g+','+nb.b+','+(nb.a*pulse)+')';
                for (var j = nb.layers - 1; j >= 0; j--) {
                    ctx.beginPath();
                    ctx.arc(nx, ny, nb.rad * (0.3 + j / nb.layers * 0.7), 0, 6.28);
                    ctx.fill();
                }
            }

            // Stars
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var dx = Math.sin(time * s.ds * 0.5) * s.z * 3;
                var dy = Math.cos(time * s.ds * 0.3 + 1.5) * s.z * 2;
                var x = ((s.bx + dx) % W + W) % W;
                var y = ((s.by + dy) % H + H) % H;
                var t1 = Math.sin(time * s.ts + s.to);
                var t2 = Math.sin(time * s.ts * 0.7 + s.to * 1.3);
                var tw = (t1 * 0.6 + t2 * 0.4 + 1) * 0.5;
                var br = s.bb * (0.3 + tw * 0.7);
                var cr = Math.floor(s.cr * br * 255);
                var cg = Math.floor(s.cg * br * 255);
                var cb = Math.floor(s.cb * br * 255);

                // Glow + spikes for bright stars
                if (s.bright) {
                    ctx.fillStyle = 'rgba('+cr+','+cg+','+cb+','+(br*0.12)+')';
                    ctx.beginPath(); ctx.arc(x, y, s.sz * 6, 0, 6.28); ctx.fill();
                    if (br > 0.75) {
                        var sl = s.sz * 8 * br;
                        ctx.strokeStyle = 'rgba('+cr+','+cg+','+cb+','+(br*0.25)+')';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(x-sl,y); ctx.lineTo(x+sl,y); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x,y-sl); ctx.lineTo(x,y+sl); ctx.stroke();
                    }
                }
                // Core
                ctx.fillStyle = 'rgba('+cr+','+cg+','+cb+','+br+')';
                ctx.beginPath(); ctx.arc(x, y, s.sz, 0, 6.28); ctx.fill();
                // White core for near stars
                if (s.z > 0.5) {
                    ctx.fillStyle = 'rgba(255,255,255,'+(br*0.8)+')';
                    ctx.beginPath(); ctx.arc(x, y, s.sz * 0.4, 0, 6.28); ctx.fill();
                }
            }

            // Shooting stars
            for (var si = 0; si < shooting.length; si++) {
                var sh = shooting[si];
                if (!sh.active) continue;
                sh.trail.push([sh.x, sh.y]);
                if (sh.trail.length > 30) sh.trail.shift();
                sh.x += sh.vx * dt; sh.y += sh.vy * dt; sh.vy += 40 * dt;
                sh.life += dt;
                if (sh.life >= sh.ml || sh.x > W + 50 || sh.y > H + 50) { sh.active = false; continue; }
                var prog = sh.life / sh.ml;
                var ma = prog < 0.05 ? prog/0.05 : prog > 0.6 ? (1-prog)/0.4 : 1;
                // Trail
                for (var ti = 1; ti < sh.trail.length; ti++) {
                    var tt = ti / sh.trail.length;
                    var ta = ma * tt * tt * 0.85;
                    var tr = Math.floor(255*tt + 150*(1-tt));
                    var tg = Math.floor(255*tt + 180*(1-tt));
                    ctx.strokeStyle = 'rgba('+tr+','+tg+',255,'+ta+')';
                    ctx.lineWidth = sh.sz * tt;
                    ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(sh.trail[ti-1][0], sh.trail[ti-1][1]);
                    ctx.lineTo(sh.trail[ti][0], sh.trail[ti][1]); ctx.stroke();
                }
                // Head
                ctx.fillStyle = 'rgba(255,255,255,'+ma+')';
                ctx.beginPath(); ctx.arc(sh.x, sh.y, sh.sz*2, 0, 6.28); ctx.fill();
                ctx.fillStyle = 'rgba(180,200,255,'+(ma*0.3)+')';
                ctx.beginPath(); ctx.arc(sh.x, sh.y, sh.sz*5, 0, 6.28); ctx.fill();
            }

            // Spawn shooting stars
            if (Math.random() < dt * 0.22) {
                for (var sp = 0; sp < shooting.length; sp++) {
                    if (!shooting[sp].active) {
                        var sh = shooting[sp];
                        if (Math.random() < 0.7) { sh.x = Math.random()*W; sh.y = -10; }
                        else { sh.x = -10; sh.y = Math.random()*H*0.6; }
                        var ang = 0.3 + Math.random()*0.7;
                        var spd = 500 + Math.random()*700;
                        sh.vx = Math.cos(ang)*spd; sh.vy = Math.sin(ang)*spd;
                        sh.life = 0; sh.ml = 0.5+Math.random(); sh.sz = 1+Math.random()*1.5;
                        sh.active = true; sh.trail = [];
                        break;
                    }
                }
            }
        }

        init();
        var last = performance.now();
        function frame(now) {
            var dt = Math.min((now - last) / 1000, 0.05);
            last = now;
            tick(dt);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
        window.addEventListener('resize', function() { resize(); });
    })();
    </script>
