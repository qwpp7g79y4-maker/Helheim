<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helheim — Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #09090b; color: #f0f0f3; font-family: 'Inter', sans-serif; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-operational { background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.5); }
        .status-degraded { background: #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.5); }
        .status-down { background: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <a href="/" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-white mb-8 transition">
            <span class="w-6 h-6 bg-violet-600 rounded-lg flex items-center justify-center font-bold text-xs">H</span>
            Helheim
        </a>
        <h1 class="text-2xl font-bold mb-2">Service status</h1>
        <p class="text-gray-400 text-sm mb-6" id="status-desc">Laden...</p>
        <div class="flex items-center justify-center gap-2" id="status-row">
            <span class="status-dot status-operational" id="status-dot"></span>
            <span class="font-medium" id="status-text">—</span>
        </div>
        <p class="text-gray-500 text-xs mt-8"><a href="/health" class="text-violet-400 hover:underline">Health endpoint</a> · <a href="/" class="text-violet-400 hover:underline">Home</a></p>
    </div>
    <script>
    (function(){
        var dot = document.getElementById('status-dot');
        var text = document.getElementById('status-text');
        var desc = document.getElementById('status-desc');
        fetch('/api/v1/nodes').then(function(r){ return r.json(); }).then(function(d){
            var online = (d.nodes || []).filter(function(n){ return n.online; }).length;
            if (online > 0) {
                dot.className = 'status-dot status-operational';
                text.textContent = 'Operational';
                desc.textContent = 'All systems operational.';
            } else {
                dot.className = 'status-dot status-degraded';
                text.textContent = 'Degraded';
                desc.textContent = 'Limited availability.';
            }
        }).catch(function(){
            dot.className = 'status-dot status-down';
            text.textContent = 'Unknown';
            desc.textContent = 'Could not reach the API.';
        });
    })();
    </script>
</body>
</html>
